name: Release UseRhythm Player

on:
  push:
    tags:
      - "player-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            npm_script: player:dist:win
            artifact_glob: |
              apps/player/dist/*.exe
              apps/player/dist/*.zip
          - os: macos-latest
            npm_script: player:dist:mac
            artifact_glob: |
              apps/player/dist/*.dmg
              apps/player/dist/*.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/player/package-lock.json"

      - name: Install player dependencies
        working-directory: apps/player
        run: npm ci

      - name: Validate player config
        run: npm run player:build

      - name: Build player artifacts
        run: npm run ${{ matrix.npm_script }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/player-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          generate_release_notes: true
